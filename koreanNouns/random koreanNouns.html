<body>

            </div>

            <div class="main">
                <h1 class="section-title">Random Nouns</h1>
                
                <div id="output" class="word-flex-container"></div>

                <button onclick="displayRandomNouns('output', koreanNouns)">S T A R T (단어)</button>

                <div class="section-title">Random Triz</div>

                <div class="triz-section">
                    <div class="triz-text-box">
                        <div id="newOutput"></div>
                    </div>
                </div>
                
                <button onclick="displayRandomNoun('newOutput', newKoreanNouns)">S T A R T (TRIZ)</button>

                                                <aside class="ad-space">
                 <ins class="kakao_ad_area" style="display:none;"
                    data-ad-unit = "DAN-pLMbR4etcP17lZCH"

    <script src="kdata.js"></script>
    <script src="newkdata.js"></script>
    <script>  
        const koreanNouns = k;
        const newKoreanNouns = nk;

        function getRandomKoreanNoun(nouns) {
            if(!nouns || nouns.length === 0) return "데이터 없음";
            const randomIndex = Math.floor(Math.random() * nouns.length);
            return nouns[randomIndex];
        }
    
        function displayRandomNouns(outputId, nouns) {
            const outputDiv = document.getElementById(outputId);
            outputDiv.innerHTML = "";
    
            for (let i = 0; i < 3; i++) {
                const randomNoun = getRandomKoreanNoun(nouns);
                const itemBox = document.createElement("div");
                itemBox.className = "word-box";
                
                const paragraph = document.createElement("h3");
                paragraph.textContent = randomNoun;
                
                itemBox.appendChild(paragraph);
                outputDiv.appendChild(itemBox);

                // 단어 사이에 + 표시 넣기 (마지막 요소 제외)
                if (i < 2) {
                    const plusSpan = document.createElement("div");
                    plusSpan.className = "inner-plus";
                    plusSpan.textContent = "+";
                    outputDiv.appendChild(plusSpan);
                }
            }
        }
    
        function displayRandomNoun(outputId, nouns) {
            const outputDiv = document.getElementById(outputId);
            outputDiv.innerHTML = "";
    
            const randomNoun = getRandomKoreanNoun(nouns);
            const paragraph = document.createElement("p");
            paragraph.className = "triz-highlight";
            paragraph.textContent = randomNoun;
            outputDiv.appendChild(paragraph);
        }
    
        // 초기 실행
        window.addEventListener('DOMContentLoaded', () => {
            displayRandomNouns("output", koreanNouns);
            displayRandomNoun("newOutput", newKoreanNouns);
        });
    </script>
</body>
</html>
