            // import { k } from 'kdata.js';
              function getRandomKoreanNoun(nouns) {
              const randomIndex = Math.floor(Math.random() * nouns.length);
              return nouns[randomIndex];
            }
        
            // 결과를 화면에 표시하는 함수
            function displayRandomNouns(outputId, nouns) {
              const outputDiv = document.getElementById(outputId);
              outputDiv.innerHTML = ""; // 이전 결과 초기화
        
              for (let i = 0; i < 3; i++) {
                const randomNoun = getRandomKoreanNoun(nouns);
                const paragraph = document.createElement("h3");
                paragraph.textContent = randomNoun;
                outputDiv.appendChild(paragraph);
              }
            }
        
            // 새로운 결과를 화면에 표시하는 함수
            function displayRandomNoun(outputId, nouns) {
              const outputDiv = document.getElementById(outputId);
              outputDiv.innerHTML = ""; // 이전 결과 초기화
        
              const randomNoun = getRandomKoreanNoun(nouns);
              const paragraph = document.createElement("h3");
              paragraph.textContent = randomNoun;
              outputDiv.appendChild(paragraph);
            }
        
            // 페이지 로드 시 초기 표시
            displayRandomNouns("output", koreanNouns);
